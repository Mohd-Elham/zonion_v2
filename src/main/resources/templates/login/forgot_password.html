<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Zonion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">
<nav class="bg-white shadow-sm p-4">
    <div class="container mx-auto">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <img alt="Zonion" class="h-8" th:src="@{/images/onion-logo.png}">
                <h1 class="text-2xl font-[800] text-zonion ml-3 mt-1.5">ZONION</h1>
            </div>
        </div>
    </div>
</nav>

<section class="bg-white">
    <div class="container mx-auto">
        <div class="flex flex-col items-center justify-center min-h-screen py-12 px-4 sm:px-6 lg:px-8">
            <div class="max-w-md w-full space-y-8">
                <div class="text-center">
                    <h2 class="text-3xl font-extrabold text-gray-900">Reset Your Password</h2>
                    <p class="mt-2 text-sm text-gray-600">
                        Enter your email address and we'll send you a code to reset your password.
                    </p>
                </div>

                <form th:action="@{/forgot_password}" method="post">
                    <div class="mt-4">
                        <input type="email" name="email" id="email"
                               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-zonion"
                               placeholder="Enter your email" required>
                        <div th:if="${param.error}" class="text-red-500 text-sm mt-2">
                            <span th:if="${param.error[0] == 'email_not_found'}">Email not found</span>
                            <span th:if="${param.error[0] == 'invalid_otp'}">Invalid OTP</span>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full mt-6 py-2 px-4 bg-zonion text-white rounded-md hover:bg-zonion/90 transition">
                        Send OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
<script>
    // Tailwind config remains the same
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zonion: '#BC5DC6',
                },
                fontFamily: {
                    'sans': ['Montserrat', 'sans-serif'],
                }
            }
        }
    };
</script>
</html>
