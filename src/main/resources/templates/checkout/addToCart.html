<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" type="image/x-icon" th:href="@{/images/onion-logo.png}">
    <title>Zonion - Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:replace="~{fragments/tailwind-config}"></script>
</head>
<body class="font-sans">
<div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <a href="/" class="flex items-center gap-2">
            <img th:src="@{/images/onion-logo.png}" alt="Zonion Logo" class="h-12">
            <span class="text-zonion font-bold text-2xl">ZONION</span>
        </a>
        <div class="flex items-center gap-4">
            <a href="/account" class="text-gray-600">
                <span class="material-symbols-outlined">person</span>
            </a>
            <a href="/cart" class="relative">
                <span class="material-symbols-outlined text-zonion">shopping_cart</span>
                <span th:if="${cartSize > 0}"
                      class="absolute -top-2 -right-2 bg-zonion text-white text-xs rounded-full h-5 w-5 flex items-center justify-center"
                      th:text="${cartSize}">
                    </span>
            </a>
        </div>
    </div>

    <!-- Cart Content -->
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Your cart items</h1>

        <!-- Empty Cart Message -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-8">
            <p class="text-gray-500 mb-4">Your cart is empty</p>
            <a href="/menu" class="text-zonion hover:underline">Back to shopping</a>
        </div>

        <!-- Cart Items -->
        <div th:unless="${#lists.isEmpty(cartItems)}" class="space-y-6">
            <!-- Headers -->
            <div class="grid grid-cols-4 gap-4 pb-4 border-b text-gray-600">
                <div class="col-span-2">Product</div>
                <div class="text-center">Quantity</div>
                <div class="text-right">Total</div>
            </div>

            <!-- Cart Items List -->
            <div th:each="item : ${cartItems}" class="grid grid-cols-4 gap-4 items-center py-4 border-b">
                <div class="col-span-2 flex gap-4">
                    <img th:src="${item.product.image_1}"
                         th:alt="${item.product.product_name}"
                         class="w-24 h-24 object-cover rounded-lg">
                    <div>
                        <h3 th:text="${item.product.product_name}"
                            class="font-semibold text-lg">
                        </h3>
                        <button th:onclick="'removeFromCart(\'' + ${item.product.id} + '\')'"
                                class="text-zonion text-sm hover:underline">
                            Remove
                        </button>
                    </div>
                </div>

                <!-- Quantity Controls -->
                <div class="flex justify-center items-center gap-2">
                    <button th:onclick="'updateQuantity(\'' + ${item.product.id} + '\', -1)'"
                            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center">
                        -
                    </button>
                    <span th:text="${item.quantity}" class="w-8 text-center"></span>
                    <button th:onclick="'updateQuantity(\'' + ${item.product.id} + '\', 1)'"
                            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center">
                        +
                    </button>
                </div>

                <!-- Total Price -->
                <div class="text-right">
                    <span th:text="${item.quantity * #numbers.parseDecimal(item.product.price)} + 'rs'"></span>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="flex justify-between items-center pt-6">
                <div class="text-gray-500 text-sm">
                    Tax and shipping cost will be calculated later
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between gap-8">
                        <span class="font-semibold">Sub-total</span>
                        <span th:text="${totalAmount} + 'rs'" class="font-bold"></span>
                    </div>
                    <button onclick="window.location.href='/checkout'"
                            class="w-full bg-zonion text-white py-2 px-4 rounded-lg hover:bg-opacity-90 transition-colors">
                        Check-out
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function updateQuantity(productId, change) {
        fetch(`/cart/update/${productId}?change=${change}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        }).then(() => window.location.reload());
    }

    function removeFromCart(productId) {
        fetch(`/cart/remove/${productId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        }).then(() => window.location.reload());
    }
</script>
</body>
</html>
