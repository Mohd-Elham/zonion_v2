<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Zonion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zonion: '#BC5DC6',
                    },
                    fontFamily: {
                        'sans': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        };
    </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen">
<!-- Navigation -->
<nav class="bg-white shadow-sm">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div class="flex items-center justify-between">
            <a href="/" class="flex-shrink-0">
                <div class="flex items-center">
                    <img alt="Zonion" class="h-6 sm:h-8" th:src="@{/images/onion-logo.png}">
                    <h1 class="text-xl sm:text-2xl font-[800] text-zonion ml-2 sm:ml-3">ZONION</h1>
                </div>
            </a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Order Success Message -->
    <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6 text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">Order Placed Successfully!</h1>
<!--            <p class="text-gray-600 mb-4">Order ID: <span class="font-medium" th:text="${order.id}"></span></p>-->
            <p class="text-gray-600">Thank you for shopping with Zonion. We'll send you regular updates about your order.</p>
        </div>

        <!-- Order Details -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-6">Order Details</h2>

            <!-- Items List -->
            <div class="space-y-4 mb-6">
<!--                <div th:each="item : ${order.items}" class="flex items-center gap-4">-->
<!--                    <img th:src="${item.productImage}" th:alt="${item.productName}"-->
<!--                         class="w-16 h-16 object-cover rounded">-->
<!--                    <div class="flex-1">-->
<!--                        <h4 class="text-md font-medium text-zonion" th:text="${item.productName}"></h4>-->
<!--                        <p class="text-sm text-gray-600">-->
<!--                            Qty: <span th:text="${item.quantity}"></span>-->
<!--                        </p>-->
<!--                        <p class="text-sm font-medium">-->
<!--                            ₹<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}"></span>-->
<!--                            <span class="text-gray-600"> x<span th:text="${item.quantity}"></span></span>-->
<!--                        </p>-->
<!--                    </div>-->
                </div>
            </div>

            <!-- Price Summary -->
            <div class="border-t py-4 space-y-3">
                <div class="flex justify-between text-sm">
                    <span>Subtotal</span>
<!--                    <span>₹<span th:text="${#numbers.formatDecimal(order.subtotal, 1, 2)}"></span></span>-->
                </div>
                <div class="flex justify-between text-sm">
                    <span>Delivery</span>
                    <span class="text-green-600">FREE</span>
                </div>
                <div class="flex justify-between font-medium pt-3 border-t">
                    <span>Total</span>
<!--                    <span class="text-zonion">₹<span th:text="${#numbers.formatDecimal(order.total, 1, 2)}"></span></span>-->
                </div>
            </div>
        </div>

        <!-- Delivery Details -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-6">Delivery Details</h2>
            <div class="space-y-4">
                <div class="flex items-start gap-4">
                    <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-medium mb-1">Delivery Address</h3>
<!--                        <p class="text-gray-600 text-sm" th:text="${order.address.name}"></p>-->
<!--                        <p class="text-gray-600 text-sm" th:text="${order.address.street}"></p>-->
<!--                        <p class="text-gray-600 text-sm">-->
<!--                            <span th:text="${order.address.city}"></span>,-->
<!--                            <span th:text="${order.address.state}"></span> - -->
<!--                            <span th:text="${order.address.zip}"></span>-->
                        </p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-medium mb-1">Payment Method</h3>
                        <p class="text-gray-600 text-sm">Cash on Delivery</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/orders" class="inline-flex justify-center items-center px-6 py-3 border border-zonion text-zonion font-medium rounded-lg hover:bg-zonion hover:text-white transition-colors">
                View All Orders
            </a>
            <a href="/" class="inline-flex justify-center items-center px-6 py-3 bg-zonion text-white font-medium rounded-lg hover:bg-purple-700 transition-colors">
                Continue Shopping
            </a>
        </div>
    </div>
</div>
</body>
</html>
