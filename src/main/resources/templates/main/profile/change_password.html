<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-50 font-sans min-h-screen">
<nav class="bg-white shadow-sm fixed w-full top-0 z-50">
    <div class="container mx-auto px-4 py-3">
        <div class="flex items-center justify-between">
            <!-- Logo Section -->
            <a th:href="@{/}">
                <div class="flex items-center">
                    <img alt="Zonion" class="h-6 sm:h-8" th:src="@{/images/onion-logo.png}">
                    <h1 class="text-lg sm:text-xl md:text-2xl font-[800] text-zonion ml-2 sm:ml-3">ZONION</h1>
                </div>
            </a>
        </div>
    </div>
</nav>
<div class="flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Reset Your Password</h2>

        <div th:if="${otpSent}" class="mb-4 text-green-500 text-center">
            OTP sent to <span th:text="${email}"></span>. Please check your email.
        </div>

        <div th:if="${error}" class="mb-4 text-red-500 text-center" th:text="${error}"></div>
        <div th:if="${success}" class="mb-4 text-green-500 text-center" th:text="${success}"></div>


        <form th:action="@{/profile/reset_password}" method="post" class="space-y-4" onsubmit="return validateResetPasswordForm()">
            <input type="hidden" name="email" th:value="${email}">

            <div>
                <label for="otp" class="block text-sm font-medium text-gray-700">Old Password</label>
                <div class="mt-1">
                    <input type="text" name="oldPassword" id="otp" required
                           class="shadow-sm focus:ring-zonion focus:border-zonion block w-full sm:text-sm border-gray-300 rounded-md px-3 py-2">
                </div>
            </div>

            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password</label>
                <div class="mt-1 relative">
                    <input type="password" name="newPassword" id="newPassword" required
                           oninput="validateNewPasswordStrength(this.value)"
                           class="shadow-sm focus:ring-zonion focus:border-zonion block w-full sm:text-sm border-gray-300 rounded-md px-3 py-2">
                    <button type="button" onclick="togglePassword('newPassword')"
                            class="absolute right-2 top-1/2 transform -translate-y-1/2">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div id="newPasswordRequirements" class="text-[10px] justify-center gap-3 mt-1 flex">
                    <p id="newPasswordLengthReq" class="text-red-500">✗ Minimum 8 characters</p>
                    <p id="newPasswordUpperReq" class="text-red-500">✗ At least one uppercase letter</p>
                    <p id="newPasswordNumberReq" class="text-red-500">✗ At least one number</p>
                </div>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                <div class="mt-1 relative">
                    <input type="password" name="confirmPassword" id="confirmPassword" required
                           oninput="checkPasswordMatch()"
                           class="shadow-sm focus:ring-zonion focus:border-zonion block w-full sm:text-sm border-gray-300 rounded-md px-3 py-2">
                    <button type="button" onclick="togglePassword('confirmPassword')"
                            class="absolute right-2 top-1/2 transform -translate-y-1/2">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span id="confirmPasswordError" class="text-red-500 text-xs hidden">Passwords do not match!</span>
            </div>

            <div class="flex justify-center mt-6">
                <button type="submit" class="bg-zonion hover:bg-opacity-90 text-white font-bold py-2 px-6 rounded-md focus:outline-none focus:shadow-outline">
                    Reset Password
                </button>
            </div>
        </form>
    </div>
</div>
</body>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zonion: '#BC5DC6',
                },
                fontFamily: {
                    'sans': ['Montserrat', 'sans-serif'],
                }
            }
        }
    };

    function validateNewPasswordStrength(password) {
        const lengthReq = document.getElementById('newPasswordLengthReq');
        const upperReq = document.getElementById('newPasswordUpperReq');
        const numberReq = document.getElementById('newPasswordNumberReq');

        // Check minimum length
        if (password.length >= 8) {
            lengthReq.classList.replace('text-red-500', 'text-green-500');
            lengthReq.innerHTML = '✓ Minimum 8 characters';
        } else {
            lengthReq.classList.replace('text-green-500', 'text-red-500');
            lengthReq.innerHTML = '✗ Minimum 8 characters';
        }

        // Check uppercase
        if (/[A-Z]/.test(password)) {
            upperReq.classList.replace('text-red-500', 'text-green-500');
            upperReq.innerHTML = '✓ At least one uppercase letter';
        } else {
            upperReq.classList.replace('text-green-500', 'text-red-500');
            upperReq.innerHTML = '✗ At least one uppercase letter';
        }

        // Check number
        if (/\d/.test(password)) {
            numberReq.classList.replace('text-red-500', 'text-green-500');
            numberReq.innerHTML = '✓ At least one number';
        } else {
            numberReq.classList.replace('text-green-500', 'text-red-500');
            numberReq.innerHTML = '✗ At least one number';
        }
    }

    function checkPasswordMatch() {
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorElement = document.getElementById('confirmPasswordError');

        if (password !== confirmPassword) {
            errorElement.classList.remove('hidden');
            return false;
        } else {
            errorElement.classList.add('hidden');
            return true;
        }
    }

    function validateResetPasswordForm() {
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Check password requirements
        const isLengthValid = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);
        const hasNumber = /\d/.test(password);

        if (!isLengthValid || !hasUpper || !hasNumber) {
            alert('Please meet all password requirements');
            return false;
        }

        if (!checkPasswordMatch()) {
            return false;
        }

        return true;
    }

    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const buttonIcon = input.nextElementSibling.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            buttonIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            buttonIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</html>
