<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Orders Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>
<!-- Header -->
<nav class="bg-white shadow-sm p-4">
    <div class="container mx-auto">
        <div class="flex items-center justify-between">
            <a href="/">
                <div class="flex items-center">
                    <img th:src="@{/images/onion-logo.png}" alt="Zonion" class="h-8">
                    <h1 class="text-2xl font-[800] text-zonion ml-3 mt-1.5">ZONION</h1>
                </div>
            </a>
        </div>
    </div>
</nav>

<div class="flex">
    <!-- Sidebar -->
    <div class="flex-col w-64 h-screen border-r bg-white">
        <div class="text-xl text-zonion font-[600] p-8 border-b">Admin Dashboard</div>

        <!-- Navigation Items -->
        <nav class="mt-4">

            <a href="/admin_dashboard/main" class="flex items-center px-8 py-3  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Admin Dashboard</span>
            </a>
            <a href="/admin_dashboard"
               class="flex items-center px-8 py-3 text-gray-700 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Users</span>
            </a>
            <a href="/admin_dashboard/products"
               class="flex items-center px-8 py-3   hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Products</span>
            </a>
            <a href="/admin_dashboard/category"
               class="flex items-center px-8 py-3   hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Categories</span>
            </a>
            <a href="/admin/orders"
               class="flex items-center px-8 py-3 bg-purple-50 text-zonion  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Orders</span>
            </a>
            <a href="/admin_dashboard/inventory"
               class="flex items-center px-8 py-3  bg-purple-50 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">inventory</span>
            </a>
            <a href="/admin_dashboard/coupons"
               class="flex items-center px-8 py-3   hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Coupons</span>
            </a>
            <a href="/admin_dashboard/offers"
               class="flex items-center px-8 py-3  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Offers</span>
            </a>
            <a href="/admin_dashboard/sales-report"
               class="flex items-center px-8 py-3 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Sales Report</span>
            </a>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 p-8 pb-0">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Orders Management</h2>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Order ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">User</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Items</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Order Date</th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <th:block th:each="order, orderStat : ${orders}">
                    <tr class="hover:bg-gray-50 cursor-pointer order-row" th:attr="data-order-id=${orderStat.index}">
                        <td class="px-6 py-4 whitespace-nowrap" th:text="${order.id}"></td>
                        <td class="px-6 py-4 whitespace-nowrap" th:text="${userIdToUsername.get(order.userId)}"></td>
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <span class="text-sm text-gray-900" th:text="${#lists.size(order.items)} + ' items'"></span>
                                <button class="ml-2 text-zonion hover:text-purple-700 text-sm toggle-details">
                                    Show details
                                </button>
                            </div>
                        </td>
                        <td class="px-6 py-4 font-medium" th:text="${'₹' + #numbers.formatDecimal(order.totalPrice, 1, 2)}"></td>
                        <td class="px-6 py-4">
                            <form th:action="@{/admin/orders/update-status}" method="post">
                                <input type="hidden" name="orderId" th:value="${order.id}">
                                <select name="newStatus"
                                        class="border rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                                        th:classappend="${order.status == 'CANCELLED' or order.status == 'DELIVERED' or order.status == 'FAILED_PAYMENT'} ? 'cursor-not-allowed opacity-50' : ''"
                                        th:disabled="${order.status == 'CANCELLED' or order.status == 'DELIVERED' or order.status == 'FAILED_PAYMENT'}"
                                        onchange="this.form.submit()">
                                    <option th:each="status : ${statusOptions}"
                                            th:value="${status}"
                                            th:selected="${order.status == status}"
                                            th:text="${status}"></option>
                                </select>
                            </form>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                    <tr class="details-row hidden bg-gray-50" th:attr="data-order-id=${orderStat.index}">
                        <td colspan="6" class="px-6 py-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <h4 class="font-medium text-gray-900 mb-2">Order Items</h4>
                                    <div class="space-y-2">
                                        <div th:each="item : ${order.items}" class="flex items-center space-x-4">
                                            <div class="flex-1">
                                                <p class="text-sm font-medium text-gray-900" th:text="${productIdToName.get(item.productId)}"></p>
                                                <p class="text-sm text-gray-500">
                                                    Quantity: <span th:text="${item.quantity}"></span>
                                                    <span th:if="${item.price}" th:text="${'• ₹' + #numbers.formatDecimal(item.price, 1, 2) + ' each'}"></span>
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zonion: '#BC5DC6',
                },
                fontFamily: {
                    'sans': ['Montserrat', 'sans-serif'],
                },
            },
        },
    };

    // Toggle order details
    $(document).ready(function() {
        $('.toggle-details').click(function(e) {
            e.stopPropagation();
            const row = $(this).closest('tr');
            const orderId = row.data('order-id');
            const detailsRow = $(`tr.details-row[data-order-id="${orderId}"]`);

            // Hide all other detail rows
            $('.details-row').not(detailsRow).addClass('hidden');
            $('.toggle-details').text('Show details');

            // Toggle current detail row
            detailsRow.toggleClass('hidden');
            $(this).text(detailsRow.hasClass('hidden') ? 'Show details' : 'Hide details');
        });

        // Allow clicking anywhere on the row to toggle details
        $('.order-row').click(function() {
            $(this).find('.toggle-details').click();
        });

        // Prevent status dropdown from triggering row expansion
        $('select').click(function(e) {
            e.stopPropagation();
        });
    });
</script>
</body>
</html>
