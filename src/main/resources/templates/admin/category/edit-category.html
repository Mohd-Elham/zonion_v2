<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Cropper.js CSS and JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Category with Image Cropping</title>
</head>
<body>
<!-- Header Fragment -->
<div th:fragment="header">
    <nav class="bg-white shadow-sm p-4">
        <div class="container mx-auto">
            <div class="flex items-center justify-between">
                <a href="/">
                    <div class="flex items-center">
                        <img th:src="@{/images/onion-logo.png}" alt="Zonion" class="h-8">
                        <h1 class="text-2xl font-[800] text-zonion ml-3 mt-1.5">ZONION</h1>
                    </div>
                </a>
                <div class="flex items-center gap-4">
                    <button class="p-2 hover:bg-gray-100 rounded-full">
                        <i data-lucide="bell" class="w-5 h-5 text-gray-600"></i>
                    </button>
                    <button class="p-2 hover:bg-gray-100 rounded-full">
                        <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>
</div>

<div class="flex">
    <!-- Sidebar -->
    <div class="flex-col w-64 h-screen border-r bg-white">
        <div class="text-xl text-zonion font-[600] p-8 border-b">Admin Dashboard</div>
        <!-- Navigation Items -->
        <nav class="mt-4">
            <a href="/admin_dashboard" class="flex items-center px-8 py-3 text-gray-700 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <i data-lucide="bar-chart" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">Users</span>
            </a>
            <a href="/admin_dashboard/products" class="flex items-center px-8 py-3 text-gray-700 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <i data-lucide="shopping-bag" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">Products</span>
            </a>
            <a href="/admin_dashboard/category" class="flex items-center px-8 py-3 text-zonion bg-purple-50 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <i data-lucide="grid" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">Categories</span>
            </a>
        </nav>
    </div>

    <!-- Edit Category Form -->
    <div class="flex-1 p-8">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-6">Edit Category</h2>
            <!-- Add an id to the form for JavaScript validation -->
            <form id="editCategoryForm" th:action="@{/categories/update}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" th:value="${category.id}">

                <!-- Category Name -->
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Category Name</label>
                <p th:if="${param.error1}" class="text-red-500" th:text="${param.error1}"></p>
                    <input type="text" id="categoryNameField" name="categoryName" th:value="${category.category_name}"
                           class="w-full p-2 border rounded-lg focus:outline-none" required pattern="^(?!\s*$).+">
                    <span id="categoryNameError" class="text-red-500 text-sm hidden">Category name cannot be empty or whitespace only.</span>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="descriptionField" name="description" rows="4"
                              class="w-full px-4 py-2 border rounded-lg focus:outline-none"
                              placeholder="Enter category description" required
                              th:text="${category.category_description}"></textarea>
                    <span id="descriptionError" class="text-red-500 text-sm hidden">Description cannot exceed 100 words.</span>
                </div>

                <!-- Existing Image Preview -->
                <div th:if="${category.image_path}" class="mb-4">
                    <label class="block text-gray-700 mb-2">Current Image</label>
                    <img th:src="@{${category.image_path}}" class="h-24 w-24 rounded-lg object-cover">
                </div>

                <!-- Image Upload with Cropper -->
                <div class="space-y-4 mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category Image</label>
                    <input type="file" id="imageInput" name="image" accept="image/*"
                           class="block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">

                    <!-- Image Cropper Container -->
                    <div id="cropperContainer" class="hidden mt-4">
                        <div class="mb-4">
                            <img id="cropperImage" class="max-w-full">
                        </div>
                        <div class="flex justify-between">
                            <button type="button" id="cropButton" class="px-4 py-2 bg-zonion text-white rounded-lg hover:bg-purple-700">Crop</button>
                            <button type="button" id="cancelCropButton" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
                        </div>
                    </div>
                    <!-- Hidden input to store cropped image -->
                    <input type="hidden" id="croppedImageData" name="croppedImage">
                </div>

                <div th:if="${param.error}" class="text-red-500 mb-4">
                    Error updating category. Please try again.
                </div>

                <div class="mt-6">
                    <button type="submit"
                            class="bg-zonion text-white px-6 py-2 rounded-lg hover:bg-purple-700">
                        Update Category
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Tailwind configuration
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zonion: '#BC5DC6',
                },
                fontFamily: {
                    'sans': ['Montserrat', 'sans-serif'],
                },
            },
        },
    };

    document.addEventListener('DOMContentLoaded', function() {
        // --- Image Cropper Setup ---
        const imageInput = document.getElementById('imageInput');
        const cropperContainer = document.getElementById('cropperContainer');
        const cropperImage = document.getElementById('cropperImage');
        const cropButton = document.getElementById('cropButton');
        const cancelCropButton = document.getElementById('cancelCropButton');
        const croppedImageData = document.getElementById('croppedImageData');
        let cropper;

        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cropperImage.src = e.target.result;
                    // Destroy existing cropper if any
                    if (cropper) {
                        cropper.destroy();
                    }
                    // Initialize Cropper
                    cropper = new Cropper(cropperImage, {
                        aspectRatio: 1, // Square crop
                        viewMode: 1,
                        minCropBoxWidth: 100,
                        minCropBoxHeight: 100
                    });
                    // Show cropper container
                    cropperContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        cropButton.addEventListener('click', function() {
            // Get cropped image data as base64
            const croppedCanvas = cropper.getCroppedCanvas({
                width: 300,
                height: 300
            });
            const base64Image = croppedCanvas.toDataURL('image/jpeg');
            // Store cropped image data in hidden input
            croppedImageData.value = base64Image;
            // Hide cropper container
            cropperContainer.classList.add('hidden');
            alert('Image cropped successfully!');
        });

        cancelCropButton.addEventListener('click', function() {
            // Reset file input and hide cropper
            imageInput.value = '';
            cropperContainer.classList.add('hidden');
            if (cropper) {
                cropper.destroy();
            }
        });

        // --- Front-end Validation for Edit Category Form ---
        const editCategoryForm = document.getElementById('editCategoryForm');
        editCategoryForm.addEventListener('submit', function(e) {
            let isValid = true;
            // Validate Category Name: not empty or only whitespace
            const categoryNameField = document.getElementById('categoryNameField');
            const categoryNameError = document.getElementById('categoryNameError');
            if (!categoryNameField.value.trim()) {
                isValid = false;
                categoryNameError.classList.remove('hidden');
            } else {
                categoryNameError.classList.add('hidden');
            }
            // Validate Description: maximum 100 words
            const descriptionField = document.getElementById('descriptionField');
            const descriptionError = document.getElementById('descriptionError');
            const wordCount = descriptionField.value.trim().split(/\s+/).filter(word => word.length > 0).length;
            if (wordCount > 100) {
                isValid = false;
                descriptionError.classList.remove('hidden');
                descriptionError.textContent = `Description cannot exceed 100 words (currently ${wordCount} words).`;
            } else {
                descriptionError.classList.add('hidden');
            }
            if (!isValid) {
                e.preventDefault();
            }
        });
    });
</script>
</body>
</html>
