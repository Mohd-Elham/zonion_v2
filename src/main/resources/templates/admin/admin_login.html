<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">

    <nav class="bg-white shadow-sm p-4">
        <div class="container mx-auto">
            <div class="flex items-center justify-between">
                <!-- Logo Section -->
                <div class="flex items-center">
                    <img alt="Zonion" class="h-8" th:src="@{/images/onion-logo.png}">
                    <h1 class="text-2xl font-[800] text-zonion ml-3 mt-1.5">ZONION</h1>
                </div>
            </div>
        </div>
    </nav>
    
<section class="bg-white">
    <div class="container mx-auto ">
        <div class="flex-col items-center justify-between">



        <form class="flex flex-col items-center justify-between gap-6 py-40 font-[600] ">
            <h1 class="text-xl font-[700]">Admin Login</h1>
            <input type="text" class="border rounded-md md:w-1/3 px-4 py-2 " placeholder="Username">
            <input type="password" class="border rounded-md md:w-1/3 px-4 py-2" placeholder="Password">
            <input type="submit" class="bg-zonion rounded-md border-r-4 md:w-1/3 px-4 py-2 text-white" value="Login">
        </form>
    </div>

        </div>
</section>

</body>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    zonion: '#BC5DC6',
                },
                fontFamily: {
                    'sans': ['Montserrat', 'sans-serif'],
                },
                fontWeight: {
                    'thin': '100',
                    'extralight': '200',
                    'light': '300',
                    'normal': '400',
                    'medium': '500',
                    'semibold': '600',
                    'bold': '700',
                    'extrabold': '800',
                    'black': '900',
                },
                fontSize: {
                    'xs': ['0.75rem', { lineHeight: '1rem' }],
                    'sm': ['0.875rem', { lineHeight: '1.25rem' }],
                    'base': ['1rem', { lineHeight: '1.5rem' }],
                    'lg': ['1.125rem', { lineHeight: '1.75rem' }],
                    'xl': ['1.25rem', { lineHeight: '1.75rem' }],
                    '2xl': ['1.5rem', { lineHeight: '2rem' }],
                    '3xl': ['1.875rem', { lineHeight: '2.25rem' }],
                    '4xl': ['2.25rem', { lineHeight: '2.5rem' }],
                    '5xl': ['3rem', { lineHeight: '1' }],
                    '6xl': ['3.75rem', { lineHeight: '1' }],
                    '7xl': ['4.5rem', { lineHeight: '1' }],
                    '8xl': ['6rem', { lineHeight: '1' }],
                    '9xl': ['8rem', { lineHeight: '1' }],
                },

        },
    };
