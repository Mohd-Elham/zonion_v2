<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Cropper.js CSS and JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Category Creation with Image Cropping</title>
</head>
<body>
<!-- Header Fragment -->
<div th:fragment="header">
    <nav class="bg-white shadow-sm p-4">
        <div class="container mx-auto">
            <div class="flex items-center justify-between">
                <a href="/">
                    <div class="flex items-center">
                        <img th:src="@{/images/onion-logo.png}" alt="Zonion" class="h-8">
                        <h1 class="text-2xl font-[800] text-zonion ml-3 mt-1.5">ZONION</h1>
                    </div>
                </a>
                <div class="flex items-center gap-4">
                    <button class="p-2 hover:bg-gray-100 rounded-full">
                        <i data-lucide="bell" class="w-5 h-5 text-gray-600"></i>
                    </button>
                    <button class="p-2 hover:bg-gray-100 rounded-full">
                        <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>
</div>

<div class="flex">
    <!-- Sidebar -->
    <div class="flex-col w-64 h-screen border-r bg-white">
        <div class="text-xl text-zonion font-[600] p-8 border-b">Admin Dashboard</div>

        <!-- Navigation Items -->
        <nav class="mt-4">

            <a href="/admin_dashboard/main" class="flex items-center px-8 py-3  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Admin Dashboard</span>
            </a>
            <a href="/admin_dashboard"
               class="flex items-center px-8 py-3 text-gray-700 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">

                <span class="font-medium">Users</span>
            </a>
            <a href="/admin_dashboard/products"
               class="flex items-center px-8 py-3    hover:bg-purple-50 hover:text-zonion transition-colors duration-200">

                <span class="font-medium">Products</span>
            </a>
            <a href="/admin_dashboard/category"
               class="flex items-center px-8 py-3   hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Categories</span>
            </a>

            <a href="/admin/orders"
               class="flex items-center px-8 py-3   hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Orders</span>
            </a>
            <a href="/admin_dashboard/inventory"
               class="flex items-center px-8 py-3    hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">inventory</span>
            </a>
            <a href="/admin_dashboard/coupons"
               class="flex items-center px-8 py-3  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Coupons</span>
            </a>
            <a href="/admin_dashboard/offers"
               class="flex items-center px-8 py-3 bg-purple-50 text-zonion  hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Offers</span>
            </a>
            <a href="/admin_dashboard/sales-report"
               class="flex items-center px-8 py-3 hover:bg-purple-50 hover:text-zonion transition-colors duration-200">
                <span class="font-medium">Sales Report</span>
            </a>
        </nav>
    </div>

    <!-- category Table -->
    <!-- ... (keep existing head and sidebar) ... -->

    <!-- Categories Table -->
    <!-- ... (keep existing head and sidebar) ... -->

    <!-- Coupons Table -->
    <div class="flex-1 p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Offers</h2>
            <a href="/admin_dashboard/add_offer"
               class="bg-zonion text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors">
                Add New Offer
            </a>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Offer Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Offer Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Discount Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Min amount</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Max amount</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">End Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="offer : ${offers}">
                    <td class="px-6 py-4 whitespace-nowrap" th:text="${offer.offerName}"></td>
                    <td class="px-6 py-4 whitespace-nowrap" th:text="${offer.offerType}"></td>
                    <td class="px-6 py-4 whitespace-nowrap" th:text="${offer.discountType}"></td>
                    <td class="px-6 py-4 whitespace-nowrap" th:text="${offer.minimumDiscountAmount}"></td>
                    <td class="px-6 py-4 whitespace-nowrap" th:text="${offer.maximumDiscountAmount}"></td>
                    <td class="px-6 py-4 whitespace-nowrap"
                        th:text="${offer.endDate}"></td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <a th:href="@{'/admin_dashboard/offer/edit/' + ${offer.id}}"
                           class="text-zonion hover:text-purple-700 mr-4">Edit</a>
                        <button type="button"
                                class="toggle-coupon-status px-2 py-1 rounded text-white"
                                th:classappend="${offer.isActive()} ? 'bg-green-600' : 'bg-red-600'"
                                th:text="${offer.isActive()} ? 'On' : 'Off'"
                                th:data-coupon-id="${offer.id}"
                                th:data-is-active="${offer.isActive()}"
                                onclick="openCouponToggleModal(this)"></button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add this modal for coupon toggle confirmation below the existing toggleModal -->


    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zonion: '#BC5DC6',
                    },
                    fontFamily: {
                        'sans': ['Montserrat', 'sans-serif'],
                    },
                },
            },
        };


    </script>
</body>
</html>
